<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tool Evaluator for Brand Design</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- html2canvas for PNG export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { background-color: #F6F1E7; color: #333; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .score-cell { transition: background-color 0.3s ease, border-color 0.3s ease; }
        .pulse { animation: pulse-anim 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse-anim { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .price-textarea:focus::placeholder { color: transparent; }
        .price-textarea:focus { outline: none; box-shadow: none; border: none; }
        .price-textarea::-webkit-scrollbar { width: 4px; }
        .price-textarea::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // PROXY CONFIGURATION
        // ==========================================
        const PROXY_URL = 'https://faas-lon1-917a94a7.doserverless.co/api/v1/web/fn-fff4b9d6-0cf7-48cc-b679-6a8eb0c76b6c/default/proxy';

        const apiHandlers = {
            gemini: async (toolName, toolDescription) => {
                const res = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: 'gemini', toolName, toolDescription })
                });
                if (!res.ok) throw new Error(`Gemini error: ${res.status}`);
                return await res.json();
            },
            claude: async (toolName, toolDescription) => {
                const res = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: 'claude', toolName, toolDescription })
                });
                if (!res.ok) throw new Error(`Claude error: ${res.status}`);
                return await res.json();
            },
            deepseek: async (toolName, toolDescription) => {
                const res = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: 'deepseek', toolName, toolDescription })
                });
                if (!res.ok) throw new Error(`DeepSeek error: ${res.status}`);
                return await res.json();
            }
        };

        const RefreshIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                <path d="M3 3v5h5" />
            </svg>
        );

        const CustomCheckbox = ({ checked, disabled, onChange }) => (
            <div 
                onClick={() => !disabled && onChange(!checked)}
                className={`w-5 h-5 rounded border border-gray-300 flex items-center justify-center shrink-0 transition-colors ${checked ? 'bg-gray-100' : 'bg-white'} ${disabled ? 'opacity-30 cursor-not-allowed' : 'cursor-pointer'}`}
            >
                {checked && (
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="4">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                )}
            </div>
        );

        const ScoreCell = ({ title, data, isLoading, isError }) => {
            let bgClass = "bg-[#F9FAFB]";
            let textClass = "text-gray-400";
            let borderClass = "border-dashed border-2 border-gray-200";
            let scoreText = "-.-";
            let descText = "";

            if (isLoading) {
                scoreText = "...";
                bgClass = "bg-gray-50 pulse";
                borderClass = "border border-gray-100";
            } else if (isError) {
                bgClass = "bg-[#FEE2E2]";
                textClass = "text-[#991B1B]";
                borderClass = "border border-red-200";
                scoreText = "Err";
                descText = "Evaluation failed. Please check API keys or try regenerating.";
            } else if (data) {
                const score = parseFloat(data.score);
                scoreText = score.toFixed(1);
                descText = data.description;
                borderClass = "border border-transparent";
                
                if (score < 5.0) { bgClass = "bg-[#FEE2E2]"; textClass = "text-[#991B1B]"; }
                else if (score < 7.0) { bgClass = "bg-[#FEF3C7]"; textClass = "text-[#92400E]"; }
                else if (score < 8.5) { bgClass = "bg-[#DCFCE7]"; textClass = "text-[#166534]"; }
                else { bgClass = "bg-[#BBF7D0]"; textClass = "text-[#14532D]"; }
            }

            return (
                <div className={`score-cell rounded-[16px] p-4 md:p-5 flex flex-col ${bgClass} ${borderClass} h-full`}>
                    <div className="text-[11px] font-bold uppercase tracking-widest text-gray-500 mb-2 lg:hidden">{title}</div>
                    <div className={`text-[32px] md:text-[38px] font-bold mb-2 tracking-tight ${textClass}`}>
                        {scoreText}
                    </div>
                    {(descText || isError) && (
                        <div className="text-[11px] leading-[1.4] text-gray-700 mt-auto whitespace-normal font-medium">
                            {descText}
                        </div>
                    )}
                </div>
            );
        };

        const PriceCell = ({ priceInfo, onPriceChange, toolName, isExporting }) => {
            const handleSearch = () => {
                const query = encodeURIComponent(`${toolName || 'tool'} pricing plans`);
                window.open(`https://www.google.com/search?q=${query}`, '_blank');
            };

            return (
                <div className="score-cell rounded-[16px] p-4 md:p-6 flex flex-col bg-white border-2 border-gray-100 h-full min-h-[400px]">
                    <div className="text-[11px] font-bold uppercase tracking-widest text-gray-500 mb-4">Price</div>
                    
                    <div className="space-y-4 flex-1">
                        <div className="flex flex-col gap-3">
                            <label className="flex items-center gap-3 group">
                                <CustomCheckbox 
                                    checked={priceInfo.hasFreeTier} 
                                    disabled={priceInfo.noFreeTier}
                                    onChange={(v) => onPriceChange('hasFreeTier', v)} 
                                />
                                <span className={`text-[20px] font-medium leading-none transition-colors ${priceInfo.noFreeTier ? 'text-gray-300' : 'text-gray-800 group-hover:text-black'}`}>Free tier available</span>
                            </label>
                            
                            <label className="flex items-center gap-3 group">
                                <CustomCheckbox 
                                    checked={priceInfo.noFreeTier} 
                                    disabled={priceInfo.hasFreeTier}
                                    onChange={(v) => onPriceChange('noFreeTier', v)} 
                                />
                                <span className={`text-[20px] font-medium leading-none transition-colors ${priceInfo.hasFreeTier ? 'text-gray-300' : 'text-gray-800 group-hover:text-black'}`}>No free tier</span>
                            </label>
                        </div>

                        <div className="flex flex-col gap-2 pt-2">
                            <span className="text-[11px] font-bold uppercase tracking-widest text-gray-400">Paid plans</span>
                            {isExporting ? (
                                <div className="text-[24px] leading-[1.2] font-medium text-black whitespace-pre-wrap break-words">
                                    {priceInfo.paidPlans || '—'}
                                </div>
                            ) : (
                                <textarea 
                                    placeholder="e.g. Pro: $20/mo&#10;Business: $50/mo"
                                    value={priceInfo.paidPlans}
                                    onChange={(e) => onPriceChange('paidPlans', e.target.value)}
                                    rows={8}
                                    className="price-textarea text-[24px] leading-[1.2] font-medium text-black border-none focus:ring-0 w-full bg-transparent resize-none p-0"
                                />
                            )}
                        </div>
                    </div>
                    
                    {!isExporting && (
                        <div className="mt-8 pt-4 border-t border-gray-50" data-html2canvas-ignore="true">
                            <div className="text-[10px] text-gray-400 font-medium mb-2 leading-tight">
                                {toolName || '[tool]'} pricing plans
                            </div>
                            <button onClick={handleSearch} className="text-[10px] w-full py-2 rounded-md border border-gray-200 bg-gray-50 hover:bg-gray-100 text-gray-600 font-medium transition-colors">
                                Search in Google
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const ModelRowHeader = ({ icon, name, results, loading, onRegenerate, id, isExporting }) => (
            <div className="lg:w-[200px] flex lg:flex-col justify-between items-center lg:items-start shrink-0 pt-[19px]">
                <div className="flex items-center gap-3 lg:items-center">
                    <div className="w-8 h-8 rounded-full flex items-center justify-center bg-gray-50 border border-gray-100 shrink-0 shadow-sm">
                        {icon}
                    </div>
                    <div className="flex flex-col gap-1 overflow-visible">
                        <span className="font-bold text-[#111827] text-lg tracking-tight leading-tight">{name}</span>
                        {results?.confidence === "low" && (
                            <div className="inline-flex items-center gap-[4px] px-2 py-0.5 rounded-[6px] bg-[#FEF3C7] border border-[#FDE68A] text-[#92400E] text-[10px] font-bold tracking-wider uppercase whitespace-nowrap">
                                <span>⚠️</span>
                                <span>Low Conf.</span>
                            </div>
                        )}
                        {results?.category && (
                            <div className="inline-flex items-center px-2 py-0.5 rounded-[6px] bg-gray-100 text-gray-500 text-[10px] font-bold tracking-wider uppercase whitespace-nowrap">
                                {results.category.replace(/_/g, ' ')}
                            </div>
                        )}
                    </div>
                </div>
                {!isExporting && (
                    <button 
                        onClick={() => onRegenerate(id)}
                        disabled={loading}
                        data-html2canvas-ignore="true"
                        className="text-[11px] flex items-center gap-1.5 px-3 py-1.5 rounded-full text-gray-500 font-medium hover:text-gray-900 hover:bg-gray-100 transition-colors disabled:opacity-50 mt-1 lg:mt-3"
                    >
                        <RefreshIcon />
                        <span>Regenerate</span>
                    </button>
                )}
            </div>
        );

        const App = () => {
            const [toolName, setToolName] = React.useState('');
            const [toolDescription, setToolDescription] = React.useState('');
            const [priceInfo, setPriceInfo] = React.useState({ hasFreeTier: false, noFreeTier: false, paidPlans: '' });
            const [results, setResults] = React.useState({ gemini: null, claude: null, deepseek: null });
            const [loading, setLoading] = React.useState({ gemini: false, claude: false, deepseek: false });
            const [errors, setErrors] = React.useState({ gemini: false, claude: false, deepseek: false });
            const [copyState, setCopyState] = React.useState('Copy to pasteboard');
            const [isExporting, setIsExporting] = React.useState(false);
            const exportRef = React.useRef(null);

            const isAnyLoading = Object.values(loading).some(v => v);
            const hasResults = Object.values(results).some(r => r !== null);

            const evaluateModel = async (modelId) => {
                if (!toolName.trim()) return;
                setLoading(prev => ({ ...prev, [modelId]: true }));
                setErrors(prev => ({ ...prev, [modelId]: false }));
                try {
                    const data = await apiHandlers[modelId](toolName.trim(), toolDescription.trim());
                    setResults(prev => ({ ...prev, [modelId]: data }));
                } catch (err) {
                    console.error(`Error:`, err);
                    setErrors(prev => ({ ...prev, [modelId]: true }));
                } finally {
                    setLoading(prev => ({ ...prev, [modelId]: false }));
                }
            };

            const handleEvaluateAll = async () => {
                if (!toolName.trim()) return;
                ['gemini', 'claude', 'deepseek'].forEach(evaluateModel);
            };

            const handleDownloadPNG = async () => {
                if (!exportRef.current) return;
                setIsExporting(true);
                setTimeout(async () => {
                    try {
                        const canvas = await html2canvas(exportRef.current, {
                            scale: 2,
                            backgroundColor: null,
                            useCORS: true,
                            logging: false
                        });
                        const link = document.createElement('a');
                        link.href = canvas.toDataURL("image/png");
                        link.download = `${toolName || 'AI-Evaluation'}.png`;
                        link.click();
                    } finally { setIsExporting(false); }
                }, 150);
            };

            const handleCopyToClipboard = async () => {
                if (!exportRef.current || !hasResults) return;
                setCopyState('Copying...');
                setIsExporting(true);
                setTimeout(async () => {
                    try {
                        const canvas = await html2canvas(exportRef.current, { scale: 2, backgroundColor: null, useCORS: true });
                        canvas.toBlob(async (blob) => {
                            const item = new window.ClipboardItem({ 'image/png': blob });
                            await navigator.clipboard.write([item]);
                            setCopyState('Copied Image!');
                            setTimeout(() => setCopyState('Copy to pasteboard'), 2000);
                        });
                    } catch { 
                        setCopyState('Failed'); 
                        setTimeout(() => setCopyState('Copy to pasteboard'), 2000);
                    } finally { setIsExporting(false); }
                }, 150);
            };

            const models = [
                { id: 'gemini', name: 'Gemini', icon: <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2L14.6 9.4L22 12L14.6 14.6L12 22L9.4 14.6L2 12L9.4 9.4L12 2Z" fill="url(#gemini-grad)"/><defs><linearGradient id="gemini-grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse"><stop stopColor="#4285F4"/><stop offset="1" stopColor="#8A3FFC"/></linearGradient></defs></svg> },
                { id: 'claude', name: 'Claude', icon: <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 22H6.5L8.5 17H15.5L17.5 22H22L12 2ZM10.5 12L12 8L13.5 12H10.5Z" fill="#D97757"/></svg> },
                { id: 'deepseek', name: 'DeepSeek', icon: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4B6EF5" strokeWidth="2"><path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"/><path d="M8 12C8 14.2091 9.79086 16 12 16C14.2091 16 16 14.2091 16 12C16 9.79086 14.2091 8 12 8" strokeLinecap="round"/></svg> }
            ];

            const criteria = [
                { key: 'outputQuality', label: 'Output Quality' },
                { key: 'control', label: 'Control' },
                { key: 'speed', label: 'Speed' },
                { key: 'reliability', label: 'Reliability' }
            ];

            return (
                <div className="min-h-screen py-8 px-4 md:py-12 flex flex-col items-center">
                    {/* Saffron Header */}
                    <div className="w-full max-w-[1280px] mb-5 flex items-center gap-2 -mt-[16px]">
                        <svg viewBox="0 0 205 30" fill="none" className="h-[15px] w-auto shrink-0">
                            <path d="M5.72836 8.13577C5.72836 6.10004 8.68982 5.06789 11.9359 5.06789C15.182 5.06789 17.34 6.11075 19.3611 8.09648L23.1368 4.79289C20.7086 1.6393 16.2376 0 11.9791 0C3.90177 0 0.331452 3.50717 0.331452 8.13577C0.331452 13.2822 4.63313 15.4751 9.70579 16.7144L14.6163 17.9108C17.8624 18.7073 18.7559 19.5073 18.7559 21.2216C18.7559 23.0573 16.85 24.6109 12.4655 24.6109C8.08096 24.6109 5.91931 23.3644 3.70362 20.8716L0 24.2537C1.85181 26.4037 5.75358 29.4788 12.3034 29.4788C18.3884 29.4788 24.1132 26.4466 24.1132 21.0609C24.1132 15.3965 19.8511 13.8787 15.9169 12.8822L11.046 11.6465C7.06859 10.6501 5.73197 10.0894 5.73197 8.13577M44.4759 17.4037H38.0702L41.273 6.67147L44.4759 17.4037ZM48.2047 29.1323H53.9187L44.1084 0.610718H38.4341L28.5013 29.1359H34.2585L36.4886 22.2359H45.935L48.2047 29.1359V29.1323ZM65.7177 5.83575H81.5445V0.610718H60.2415V29.1359H65.7213V18.3251H77.9346V13.3001H65.7213V5.83932L65.7177 5.83575ZM93.693 5.83575H109.52V0.610718H88.2168V29.1359H93.6966V18.3251H105.91V13.3001H93.6966V5.83932L93.693 5.83575ZM134.573 9.54649C134.573 11.7786 133.518 13.9751 129.299 13.9751H121.506V5.59647H129.418C132.664 5.59647 134.57 6.95362 134.57 9.54649M140.453 29.1323L135.705 17.3251C138.544 15.7287 139.884 13.0572 139.884 9.46792C139.884 4.63932 136.717 0.610718 129.13 0.610718H116.185V29.1359H121.499V18.6823H130.873L134.93 29.1359H140.449L140.453 29.1323ZM168.169 14.6108C168.169 21.9109 163.95 24.5037 159.85 24.5037C156.078 24.5037 151.33 21.9894 151.33 14.8108C151.33 8.5072 155.267 5.15718 159.85 5.15718C164.433 5.15718 168.169 7.91077 168.169 14.6108ZM173.645 14.5322C173.645 5.91432 168.572 0.0500003 159.85 0.0500003C151.128 0.0500003 145.85 6.1929 145.85 14.5715C145.85 22.9501 150.84 29.493 159.85 29.493C168.861 29.493 173.645 22.9109 173.645 14.5322ZM204.247 29.1323V0.610718H198.767V19.8394L186.435 0.610718H180.389V29.1359H185.866V9.70721L198.201 29.1359H204.247V29.1323Z" fill="#111827"/>
                        </svg>
                        <div className="w-[2px] h-[15px] bg-[#111827] shrink-0"></div>
                        <span className="text-[#111827] text-[21px] leading-none font-medium tracking-tight pt-[1px]">Tool evaluator</span>
                    </div>

                    <div className="w-full max-w-[1280px] bg-[#FFFDF8] rounded-[24px] md:rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.03)] p-5 md:p-8">
                        <div className="mb-5" data-html2canvas-ignore="true">
                            <input type="text" value={toolName} onChange={(e) => setToolName(e.target.value)} placeholder="Enter tool name (e.g. Midjourney)" className="w-full text-base md:text-lg p-4 bg-white border border-gray-200 shadow-sm rounded-[8px] focus:ring-4 focus:ring-gray-100 focus:border-gray-300 outline-none placeholder-gray-400 font-medium text-gray-900" />
                            <textarea value={toolDescription} onChange={(e) => setToolDescription(e.target.value)} placeholder="Describe what this tool does (optional — helps accuracy)" rows="3" className="w-full mt-3 text-[14px] p-4 bg-white border border-gray-200 shadow-sm rounded-[8px] focus:ring-4 focus:ring-gray-100 focus:border-gray-300 outline-none placeholder-gray-400 font-medium text-gray-800 resize-none" />
                            <div className="flex flex-col sm:flex-row gap-3 mt-3">
                                <button onClick={handleEvaluateAll} disabled={isAnyLoading || !toolName.trim()} className="w-full sm:w-1/2 bg-[#FDF578] hover:bg-[#ebe15c] text-black font-medium text-base py-3 rounded-[8px] transition-all disabled:opacity-50 shadow-sm">Evaluate</button>
                                <div className="flex gap-3 w-full sm:w-1/2">
                                    <button onClick={handleDownloadPNG} disabled={!hasResults} className="w-1/2 bg-gray-50 hover:bg-gray-100 text-black border border-gray-200 font-medium text-xs py-3 rounded-[8px] transition-colors shadow-sm flex items-center justify-center gap-2 disabled:opacity-50">Download PNG</button>
                                    <button onClick={handleCopyToClipboard} disabled={!hasResults} className="w-1/2 bg-gray-50 hover:bg-gray-100 text-black border border-gray-200 font-medium text-xs py-3 rounded-[8px] transition-colors shadow-sm flex items-center justify-center gap-2 disabled:opacity-50">{copyState}</button>
                                </div>
                            </div>
                        </div>

                        <div ref={exportRef} className="bg-[#FFFDF8] rounded-[24px] px-6 py-4 -mx-6 md:px-8 md:-mx-8 mt-2">
                            {hasResults && <div className="mb-6 pt-1 pb-4 border-b border-gray-100/70"><h1 className="text-4xl md:text-[50px] font-extrabold text-[#111827] tracking-tighter">{toolName}</h1></div>}
                            <div className="grid grid-cols-1 lg:grid-cols-[200px_1fr_1fr_1fr_1fr_220px] gap-x-3">
                                <div className="hidden lg:block"></div>
                                {criteria.map(c => <div key={c.key} className="hidden lg:block text-[11px] font-bold uppercase tracking-widest text-[#9CA3AF] pl-2 mb-3">{c.label}</div>)}
                                <div className="hidden lg:block text-[11px] font-bold uppercase tracking-widest text-[#9CA3AF] pl-2 mb-3">Price</div>
                                <div className="lg:col-span-5 grid grid-cols-1 lg:grid-cols-[200px_1fr_1fr_1fr_1fr] gap-x-3">
                                    {models.map(model => (
                                        <React.Fragment key={model.id}>
                                            <ModelRowHeader id={model.id} name={model.name} icon={model.icon} results={results[model.id]} loading={loading[model.id]} onRegenerate={evaluateModel} isExporting={isExporting} />
                                            <div className="grid grid-cols-1 lg:grid-cols-4 gap-3 py-[19px] border-b border-gray-100 last:border-0 flex-1 lg:col-span-4">
                                                {criteria.map(c => <ScoreCell key={c.key} title={c.label} data={results[model.id]?.[c.key]} isLoading={loading[model.id]} isError={errors[model.id]} />)}
                                            </div>
                                        </React.Fragment>
                                    ))}
                                </div>
                                <div className="lg:row-start-2 lg:row-span-3 lg:col-start-6 mt-6 lg:mt-0 lg:pt-[19px] h-full">
                                    <PriceCell 
                                        priceInfo={priceInfo} 
                                        onPriceChange={(f, v) => setPriceInfo(p => ({ ...p, [f]: v }))} 
                                        toolName={toolName} 
                                        isExporting={isExporting} 
                                    />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
